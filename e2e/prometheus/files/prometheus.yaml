apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: prometheus

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-cluster-roles
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "podmonitors"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-roles-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-cluster-roles
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: prometheus

---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: my-prometheus
  namespace: prometheus
spec:
  replicas: 1
  serviceAccountName: prometheus-sa
  podMonitorSelector:
    matchLabels:
      # The default label provided by the operator
      camel.apache.org/prometheus: camel-dashboard-operator
  podMonitorNamespaceSelector: {}
  resources:
    requests:
      memory: 400Mi
