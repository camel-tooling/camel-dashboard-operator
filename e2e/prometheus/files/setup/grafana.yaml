apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-datasource
spec:
  instanceSelector:
    matchLabels:
      camel.apache.org/grafana: camel-dashboard-operator
  datasource:
    access: proxy
    database: prometheus
    jsonData:
      tlsSkipVerify: true
    name: prometheus
    type: prometheus
    url: http://prometheus-operated.prometheus.svc:9090

---

apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: my-grafana
  labels:
    camel.apache.org/grafana: camel-dashboard-operator
spec:
  config:
    log:
      mode: console

# kubectl port-forward svc/my-grafana-service 3000:3000